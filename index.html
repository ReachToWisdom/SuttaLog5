<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#5a3e8c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <meta http-equiv="Expires" content="0">
  <title>빠알리경전학습 (심화)</title>

<body>
  <header id="topbar">
    <div id="topbar-center">
      <span id="page-info">로딩…</span>

      <span class="tab-icon">🏠</span>

      <span class="tab-label">복습</span>
    </button>
    <button data-tab="calendar" aria-label="캘린더">
      <span class="tab-icon">📅</span>
      <span class="tab-label">캘린더</span>
    </button>
    <button data-tab="settings" aria-label="설정">
      <span class="tab-icon">⚙</span>
      <span class="tab-label">설정</span>
    </button>

  <script src="app.js?v=43"></script>
