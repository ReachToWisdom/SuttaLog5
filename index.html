<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#5a3e8c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>빠알리경전학습</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <header id="topbar">
    <button id="menu-btn" aria-label="목록">☰</button>
    <span id="page-info">로딩…</span>
    <div id="lotus-row" class="lotus-row"></div>
    <button id="settings-btn" aria-label="환경설정" title="환경설정">⚙</button>
  </header>
  <main id="page"></main>
  <nav id="nav">
    <button id="prev-btn" aria-label="이전">‹</button>
    <span id="page-num"></span>
    <button id="next-btn" aria-label="다음">›</button>
  </nav>
  <button id="memo-fab" class="memo-fab" aria-label="메모">✏️</button>
  <script src="app.js"></script>
</body>
</html>
